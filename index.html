<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>综艺资讯归档库</title>
<style>
  :root {
    --bg: #0f1115; --card: #1a1d24; --card2: #21252e; --line: #2c313c;
    --tx: #e6e8ec; --tx2: #9aa3b2; --accent: #6ea8fe; --accent2: #2b3a55;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--tx); font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; line-height: 1.5; }
  header { padding: 20px 24px 14px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  h1 { font-size: 20px; font-weight: 650; letter-spacing: .5px; }
  .sub { color: var(--tx2); font-size: 12px; margin-top: 3px; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; align-items: center; }
  select, input { background: var(--card2); color: var(--tx); border: 1px solid var(--line); border-radius: 7px; padding: 7px 11px; font-size: 13px; outline: none; }
  input { flex: 1; min-width: 180px; }
  input:focus, select:focus { border-color: var(--accent); }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { background: var(--card2); border: 1px solid var(--line); color: var(--tx2); padding: 6px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; user-select: none; }
  .tab.on { background: var(--accent2); color: var(--tx); border-color: var(--accent); }
  main { padding: 18px 24px 60px; max-width: 920px; margin: 0 auto; }
  .board-h { font-size: 15px; font-weight: 600; margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
  .sub-h { font-size: 13px; font-weight: 600; color: var(--accent); margin: 14px 0 7px 2px; padding-left: 8px; border-left: 3px solid var(--accent); }
  .sub-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin: 12px 0 14px; }
  .sub-tab { background: var(--card2); border: 1px solid var(--line); color: var(--tx2); padding: 6px 13px; border-radius: 8px; font-size: 13px; cursor: pointer; user-select: none; transition: all .12s; }
  .sub-tab:hover { border-color: var(--accent); color: var(--tx); }
  .sub-tab.on { background: var(--accent); color: #0f1115; border-color: var(--accent); font-weight: 600; }
  .sub-tab b { font-weight: 700; opacity: .7; margin-left: 2px; }
  .sub-tab.on b { opacity: .85; }
  .sub-desc { font-size: 12px; color: var(--tx2); background: var(--card2); border-radius: 8px; padding: 8px 11px; margin: 0 0 12px; line-height: 1.55; border: 1px dashed var(--line); }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px; margin-bottom: 9px; transition: border-color .15s; }
  .item:hover { border-color: var(--accent); }
  .item a.t { color: var(--tx); font-size: 14.5px; font-weight: 550; text-decoration: none; display: block; }
  .item a.t:hover { color: var(--accent); }
  .item .desc { color: var(--tx2); font-size: 12.5px; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item .meta { color: var(--tx2); font-size: 11.5px; margin-top: 7px; display: flex; gap: 10px; flex-wrap: wrap; }
  .item .meta .tag { background: var(--card2); padding: 1px 8px; border-radius: 10px; }
  .empty { color: var(--tx2); text-align: center; padding: 50px 0; font-size: 13px; }
  .count { color: var(--tx2); font-size: 12px; font-weight: 400; }
  a.src { color: var(--accent); text-decoration: none; }
  /* 全部页：分类榜·多列并排 */
  .board-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 820px) { .board-cols { grid-template-columns: 1fr; } }
  .col { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 13px 9px; display: flex; flex-direction: column; }
  .col-h { font-size: 14px; font-weight: 650; padding-bottom: 9px; margin-bottom: 6px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .col-h .count { background: var(--card2); color: var(--tx2); font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 500; flex: 0 0 auto; }
  .rank-item { display: flex; gap: 9px; padding: 9px 2px; border-bottom: 1px solid var(--line); }
  .rank-item:last-of-type { border-bottom: none; }
  .rk { flex: 0 0 20px; height: 20px; line-height: 20px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: 700; background: var(--card2); color: var(--tx2); }
  .rk1 { background: #e8b339; color: #1a1d24; }
  .rk2 { background: #aab2c0; color: #1a1d24; }
  .rk3 { background: #cd8552; color: #1a1d24; }
  .rk-body { min-width: 0; flex: 1; }
  .rk-t { color: var(--tx); font-size: 13.5px; font-weight: 550; text-decoration: none; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .rk-t:hover { color: var(--accent); }
  .rk-meta { color: var(--tx2); font-size: 11px; margin-top: 5px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .rk-sub { background: var(--accent2); color: var(--accent); padding: 0 6px; border-radius: 8px; }
  .col-more { display: block; text-align: center; margin-top: auto; padding-top: 11px; color: var(--accent); font-size: 12.5px; cursor: pointer; text-decoration: none; }
  .col-more:hover { text-decoration: underline; }
  .col-empty { color: var(--tx2); font-size: 12px; text-align: center; padding: 22px 0; }
</style>
</head>
<body>
<header>
  <h1>📺 综艺资讯归档库</h1>
  <div class="sub" id="sub">加载中…</div>
  <div class="controls">
    <select id="dateSel"><option value="all">全部日期</option></select>
    <input id="kw" type="text" placeholder="搜索标题 / 摘要 / 来源关键词…">
  </div>
  <div class="controls">
    <div class="tabs" id="tabs"></div>
  </div>
</header>
<main id="main"><div class="empty">加载中…</div></main>

<script src="data.js"></script>
<script>
const BOARD_ORDER = ['gameplay','ai','hot'];
const BOARD_NAME = { gameplay:'🎮 玩法/赛制库', ai:'🤖 AI 技术前沿', hot:'🔥 综艺热点' };

// 「全部」榜单打分：总分 = 时效分 + 子分类权重 + 信号词加成（越高越靠前）。
// 纯展示层、读已有字段；想调权重改这一处即可。
const SCORE = {
  // 子分类权重（哪类事更"重磅"），按板块
  subWeight: {
    gameplay: { mechanic:10, lineup:5, watch:3 },
    ai:       { application:10, model:7, policy:6, people:5, tool:4, trend:3 },
    hot:      { controversy:10, newshow:8, reception:5, people:4, roundup:2 }
  },
  // 信号词加成（标题+摘要命中即加，可叠加）
  signals: [
    { add:8, words:['人民日报','新华社','央视','广电','总局','官媒'] },
    { add:5, words:['全国首','首档','首部','官宣','定档','重磅'] },
    { add:4, words:['刷屏','爆款','封神','出圈','破圈','冲上热搜','全网热议','霸屏'] },
    { add:3, words:['融资','亿元','亿美元','收购','独家'] }
  ]
};

function scoreItem(it) {
  // ① 时效分
  let s = 0;
  if (it.fresh === 'fresh') s += Math.max(1, 15 - (it.daysAgo ?? 14));
  else if (it.fresh === 'recent') s += 4;
  else if (it.fresh === 'undated') s += -3; // 时间存疑，压低
  // old 不加不减
  // ② 子分类权重
  const sw = SCORE.subWeight[it.board];
  if (sw && it.sub && sw[it.sub] != null) s += sw[it.sub];
  // ③ 信号词加成
  const hay = (it.title || '') + (it.desc || '');
  for (const g of SCORE.signals) if (g.words.some(w => hay.includes(w))) s += g.add;
  return s;
}

let DB = [];            // [{date, boards:{key:{name,items:[]}}}]
let curBoard = 'all', curDate = 'all', curKw = '', curSub = {};

// 数据来自 data.js（window.NEWS_DB），由 build-site.js 生成，兼容 file:// 双击打开
async function loadAll() {
  let loaded = Array.isArray(window.NEWS_DB) ? window.NEWS_DB.slice() : [];
  loaded.sort((a,b) => b.date.localeCompare(a.date));
  DB = loaded;
  initUI();
  render();
}

function initUI() {
  const dateSel = document.getElementById('dateSel');
  DB.forEach(d => {
    const o = document.createElement('option');
    o.value = d.date; o.textContent = `${d.date}（${d.total||countDay(d)}条）`;
    dateSel.appendChild(o);
  });
  dateSel.onchange = e => { curDate = e.target.value; render(); };
  document.getElementById('kw').oninput = e => { curKw = e.target.value.trim().toLowerCase(); render(); };

  const tabs = document.getElementById('tabs');
  const mk = (k, label) => {
    const el = document.createElement('div');
    el.className = 'tab' + (k===curBoard?' on':''); el.textContent = label; el.dataset.k = k;
    el.onclick = () => { curBoard = k; [...tabs.children].forEach(c=>c.classList.toggle('on', c.dataset.k===k)); render(); };
    return el;
  };
  tabs.appendChild(mk('all','全部'));
  BOARD_ORDER.forEach(k => tabs.appendChild(mk(k, BOARD_NAME[k])));

  const totalItems = DB.reduce((s,d)=>s+countDay(d),0);
  document.getElementById('sub').textContent = `共 ${DB.length} 期归档 · ${totalItems} 条资讯 · 数据来自本地 data/ 目录`;
}

function countDay(d){ return BOARD_ORDER.reduce((s,k)=> s + ((d.boards[k]&&d.boards[k].items)?d.boards[k].items.length:0), 0); }

function matchKw(it){
  if(!curKw) return true;
  return (it.title||'').toLowerCase().includes(curKw)
      || (it.desc||'').toLowerCase().includes(curKw)
      || (it.author||'').toLowerCase().includes(curKw);
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (curBoard === 'all') { renderLeaderboard(main); return; }
  renderBoard(main);
}

// 收集某板块在当前日期/关键词过滤下的全部条目（带 _date）
function collectItems(bk) {
  const days = curDate==='all' ? DB : DB.filter(d=>d.date===curDate);
  let items = [];
  days.forEach(d => {
    const b = d.boards[bk];
    if (b && b.items) b.items.forEach(it => items.push({...it, _date:d.date}));
  });
  return items.filter(matchKw);
}

// 「全部」= 分类榜·多列并排，每列 Top5 按 scoreItem 降序
function renderLeaderboard(main) {
  const TOPN = 5;
  const wrap = document.createElement('div');
  wrap.className = 'board-cols';
  let grandShown = 0;
  BOARD_ORDER.forEach(bk => {
    const items = collectItems(bk).sort((a,b) => scoreItem(b) - scoreItem(a));
    grandShown += items.length;
    const col = document.createElement('div');
    col.className = 'col';
    const h = document.createElement('div');
    h.className = 'col-h';
    h.innerHTML = `<span>${BOARD_NAME[bk]}</span><span class="count">${items.length}</span>`;
    col.appendChild(h);
    if (!items.length) {
      const e = document.createElement('div');
      e.className = 'col-empty'; e.textContent = '本类暂无匹配资讯';
      col.appendChild(e);
    } else {
      const subNames = (window.SUBS && window.SUBS[bk] && window.SUBS[bk].names) || {};
      items.slice(0, TOPN).forEach((it, i) => col.appendChild(rankEl(it, i+1, subNames)));
      if (items.length > TOPN) {
        const more = document.createElement('a');
        more.className = 'col-more';
        more.textContent = `查看全部 ${items.length} 条 →`;
        more.onclick = () => { curBoard = bk; syncTabs(); render(); window.scrollTo(0,0); };
        col.appendChild(more);
      }
    }
    wrap.appendChild(col);
  });
  main.appendChild(wrap);
  if (!grandShown) main.innerHTML = '<div class="empty">没有匹配的资讯。换个日期 / 关键词试试。</div>';
}

function rankEl(it, rank, subNames) {
  const el = document.createElement('div');
  el.className = 'rank-item';
  const host = (()=>{ try { return new URL(it.url).hostname.replace('www.',''); } catch(e){ return ''; } })();
  const subLabel = it.sub && subNames[it.sub] ? `<span class="rk-sub">${esc(subNames[it.sub])}</span>` : '';
  el.innerHTML = `
    <div class="rk rk${rank<=3?rank:''}">${rank}</div>
    <div class="rk-body">
      <a class="rk-t" href="${it.url}" target="_blank" rel="noopener">${esc(it.title)}</a>
      <div class="rk-meta">
        ${subLabel}
        ${it.time ? `<span>🕒 ${esc(it.time)}</span>`:''}
        ${host ? `<span>🔗 ${esc(host)}</span>`:''}
      </div>
    </div>`;
  return el;
}

function syncTabs() {
  const tabs = document.getElementById('tabs');
  [...tabs.children].forEach(c => c.classList.toggle('on', c.dataset.k === curBoard));
}

// 单个板块详情视图（横排子标签那套，原逻辑）
function renderBoard(main) {
  const bk = curBoard;
  const items = collectItems(bk);
  if (!items.length) { main.innerHTML = '<div class="empty">没有匹配的资讯。换个板块 / 日期 / 关键词试试。</div>'; return; }
  const h = document.createElement('div');
  h.className = 'board-h';
  h.innerHTML = `${BOARD_NAME[bk]} <span class="count">（${items.length}）</span>`;
  main.appendChild(h);

  // 任何在 config.subs 里配置了子分类的板块：横排子标签，点哪个只显示哪支
  const subCfg = window.SUBS && window.SUBS[bk];
  if (subCfg) {
    const order = subCfg.displayOrder;
    const names = subCfg.names;
    const grouped = {};
    items.forEach(it => { const s = it.sub || '_'; (grouped[s] = grouped[s] || []).push(it); });
    const avail = order.filter(k => grouped[k]).concat(Object.keys(grouped).filter(k => !order.includes(k)));
    if (!avail.includes(curSub[bk])) curSub[bk] = avail[0];
    const bar = document.createElement('div');
    bar.className = 'sub-tabs';
    avail.forEach(sk => {
      const chip = document.createElement('span');
      chip.className = 'sub-tab' + (sk === curSub[bk] ? ' on' : '');
      chip.innerHTML = `${names[sk] || sk} <b>${grouped[sk].length}</b>`;
      chip.onclick = () => { curSub[bk] = sk; render(); };
      bar.appendChild(chip);
    });
    main.appendChild(bar);
    const dsc = subCfg.descs && subCfg.descs[curSub[bk]];
    if (dsc) {
      const note = document.createElement('div');
      note.className = 'sub-desc';
      note.textContent = '🎯 ' + dsc;
      main.appendChild(note);
    }
    (grouped[curSub[bk]] || []).forEach(it => main.appendChild(itemEl(it)));
  } else {
    items.forEach(it => main.appendChild(itemEl(it)));
  }
}

function itemEl(it) {
  const el = document.createElement('div');
  el.className = 'item';
  const host = (()=>{ try { return new URL(it.url).hostname.replace('www.',''); } catch(e){ return '来源'; } })();
  el.innerHTML = `
    <a class="t" href="${it.url}" target="_blank" rel="noopener">${esc(it.title)}</a>
    ${it.desc ? `<div class="desc">${esc(it.desc)}</div>` : ''}
    <div class="meta">
      <span class="tag">${it._date||''}</span>
      ${it.time ? `<span>🕒 ${esc(it.time)}</span>`:''}
      ${it.author ? `<span>✍ ${esc(it.author)}</span>`:''}
      <a class="src" href="${it.url}" target="_blank" rel="noopener">🔗 ${esc(host)}</a>
    </div>`;
  return el;
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

loadAll();
</script>
</body>
</html>
